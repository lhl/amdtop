name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: crates-io-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    if: github.repository == 'lhl/amdtop'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: 1.88.0

    steps:
      - name: Check out the release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libdrm-dev pkg-config

      - name: Install the minimum supported Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal --component clippy,rustfmt

      - name: Verify release metadata
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="$(
            cargo metadata --locked --no-deps --format-version 1 |
              python3 -c 'import json,sys; packages=json.load(sys.stdin)["packages"]; print(next(p["version"] for p in packages if p["name"] == "amdtop"))'
          )"

          if [[ "$RELEASE_TAG" != "v$version" ]]; then
            echo "Release tag $RELEASE_TAG does not match Cargo version $version" >&2
            exit 1
          fi

          if [[ "$(git cat-file -t "refs/tags/$RELEASE_TAG")" != "tag" ]]; then
            echo "Release tag $RELEASE_TAG must be annotated" >&2
            exit 1
          fi

          if ! grep --fixed-strings --quiet "## [$version] - " CHANGELOG.md; then
            echo "CHANGELOG.md has no dated section for $version" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

      - name: Verify the package
        run: cargo publish --dry-run --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
