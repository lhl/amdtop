# Modified for amdtop native theme schema 1 in 2026.
# Source: https://github.com/aristocratos/btop/blob/v1.4.7/themes/kanagawa-dragon.theme
# btop source commit: 6e39144aaf5a6bc01b9f795010b0914431067183
# Bashtop Kanagawa-dragon (https://github.com/rebelot/kanagawa.nvim) theme
# By: Marcus441

schema = 1
name = "kanagawa-dragon"

[ui]
background = "#181616"
foreground = "#c5c9c5"
title = "#c5c9c5"
highlight = "#c4746e"
selected_background = "#282727"
selected_foreground = "#c4b28a"
inactive = "#7a8382"
graph_text = "#c5c9c5"
misc = "#8ea4a2"

[stats]
clock = "#8ea4a2"
power = "#c5c9c5"
fan = "#c5c9c5"
bandwidth = "#c5c9c5"

[borders]
cpu = "#7a8382"
gpu = "#7a8382"
memory = "#7a8382"
npu = "#7a8382"
processes = "#7a8382"

[gradients.temperature]
stops = [
  { at = 0.0, color = "#8a9a7b" },
  { at = 0.5, color = "#b6927b" },
  { at = 1.0, color = "#c4746e" },
]

[gradients.cpu]
stops = [
  { at = 0.0, color = "#87a987" },
  { at = 0.5, color = "#c4b28a" },
  { at = 1.0, color = "#c4746e" },
]

[gradients.gpu]
stops = [
  { at = 0.0, color = "#87a987" },
  { at = 0.5, color = "#c4b28a" },
  { at = 1.0, color = "#c4746e" },
]

[gradients.memory]
stops = [
  { at = 0.0, color = "#8ba4b0" },
  { at = 0.5, color = "#949fb5" },
  { at = 1.0, color = "#8ea4a2" },
]

[gradients.npu]
stops = [
  { at = 0.0, color = "#87a987" },
  { at = 0.5, color = "#c4b28a" },
  { at = 1.0, color = "#c4746e" },
]

[gradients.process]
stops = [
  { at = 0.0, color = "#87a987" },
  { at = 0.5, color = "#c4b28a" },
  { at = 1.0, color = "#c4746e" },
]
