# Modified for amdtop native theme schema 1 in 2026.
# Source: https://github.com/aristocratos/btop/blob/v1.4.7/themes/kyli0x.theme
# btop source commit: 6e39144aaf5a6bc01b9f795010b0914431067183
#Bashtop Kyli0x Theme
#by Kyli0x <kyli0x@protonmail.ch>

schema = 1
name = "kyli0x"

[ui]
background = "#222222"
foreground = "#e8f6f5"
title = "#e8f6f5"
highlight = "#21d6c9"
selected_background = "#1aaba0"
selected_foreground = "#e8f6f5"
inactive = "#5ec4bc"
graph_text = "#ba1a84"
misc = "#21d6c9"

[stats]
clock = "#21d6c9"
power = "#ba1a84"
fan = "#ba1a84"
bandwidth = "#ba1a84"

[borders]
cpu = "#d486d4"
gpu = "#d486d4"
memory = "#d486d4"
npu = "#d486d4"
processes = "#d486d4"

[gradients.temperature]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#5ec4bc" },
]

[gradients.cpu]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#5ec4bc" },
]

[gradients.gpu]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#5ec4bc" },
]

[gradients.memory]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#5ec4bc" },
]

[gradients.npu]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#ba1a84" },
]

[gradients.process]
stops = [
  { at = 0.0, color = "#21d6c9" },
  { at = 0.5, color = "#1aaba0" },
  { at = 1.0, color = "#ba1a84" },
]
